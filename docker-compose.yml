services:

  # ── PostgreSQL + TimescaleDB ───────────────────────────────────────────────
  db:
    image: timescale/timescaledb:latest-pg15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "54322:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "63799:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Shared Application Image ───────────────────────────────────────────────
  app:
    image: registry.gitlab.com/gfunze/pios-backend/app:${IMAGE_TAG}
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── API ────────────────────────────────────────────────────────────────────
  api:
    extends:
      service: app
    command: uvicorn main:app --host 0.0.0.0 --port 9000 --workers 2
    ports:
      - "9000:9000"

  # ── Celery worker ─────────────────────────────────────────────────────────
  worker:
    extends:
      service: app
    # -Q required -- see local-docker-compose.yml's comment on the same
    # line: every task routes to "default"/"backtest", never the implicit
    # "celery" queue a bare `celery worker` consumes.
    # -E enables task events -- required for celery-exporter's task-state
    # counters (sent/received/succeeded/failed); without it those metrics
    # stay at zero forever regardless of how many tasks actually run.
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 -Q default,backtest,celery -E

  # ── Celery beat ───────────────────────────────────────────────────────────
  beat:
    extends:
      service: app
    command: celery -A app.workers.celery_app beat --loglevel=info

  # ── Market ingestion service ──────────────────────────────────────────────
  ingestor:
    extends:
      service: app
    command: python -m app.workers.market_ingestion_worker
  
  # ── Intelligence worker ───────────────────────────────────────────────────
  intelligence:
    extends:
      service: app
    command: python -m app.workers.intelligence_worker

  # ── Flower ────────────────────────────────────────────────────────────────
  flower:
    image: mher/flower:2.0
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
  
  # kafka:
  #   image: bitnami/kafka
  #   ports:
  #     - "9092:9092"

  # ── Monitoring: exporters ─────────────────────────────────────────────────
  # NOTE: mirrors local-docker-compose.yml's monitoring stack, added and
  # verified there (targets scraping, Grafana rendering real data). This
  # copy has NOT been run against this file -- it needs the private
  # registry image and hasn't been pulled/tested here. Topology differs
  # from local on purpose: api/worker/beat are containers in this file (not
  # native host processes), so plain service-name scraping is used instead
  # of local's network_mode: host + localhost workaround.
  postgres_exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${DATABASE_USER}:${DATABASE_PASSWORD:-password}@db:5432/${DATABASE_NAME}?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy

  redis_exporter:
    image: oliver006/redis_exporter:v1.62.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
    depends_on:
      - redis

  celery_exporter:
    image: danihodovic/celery-exporter:latest
    restart: unless-stopped
    command: --broker-url=redis://redis:6379/0
    depends_on:
      - redis

  # ── Monitoring: Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - api
      - postgres_exporter
      - redis_exporter
      - celery_exporter

  # ── Monitoring: Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.1
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./monitoring/grafana/provisioning/datasources/prod:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
  prometheus_data:
  grafana_data: