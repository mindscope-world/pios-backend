stages:
  - build

variables:
  IMAGE_TAG: $CI_COMMIT_TAG
  DOCKER_TLS_CERTDIR: ""

build:
  stage: build
  image: docker:24
  services:
    - docker:dind

  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
    - docker build -f Dockerfile -t $CI_REGISTRY_IMAGE/app:$IMAGE_TAG .
    - docker push $CI_REGISTRY_IMAGE/app:$IMAGE_TAG

  only:
    - tags