services:

  # ── PostgreSQL + TimescaleDB ───────────────────────────────────────────────
  db:
    image: timescale/timescaledb:latest-pg15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "54322:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "63799:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── FastAPI backend ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 9000 --workers 2
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "9000:9000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Celery worker ─────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # -Q is required: every @celery_app.task in backtest_worker.py routes to
    # "default" or "backtest" (queue="..."), never the implicit "celery"
    # queue a bare `celery worker` listens to -- without this flag, every
    # scheduled task (snapshot_pnl, regime_scan, drift_monitor, etc.) queues
    # forever and is never consumed. Found live: 15k+ backlogged messages
    # sitting unconsumed in "default" after running this command as
    # documented, going back further than this session.
    # -E enables task events -- required for celery-exporter's task-state
    # counters (sent/received/succeeded/failed); without it those metrics
    # stay at zero forever regardless of how many tasks actually run.
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 -Q default,backtest,celery -E
    env_file: .env
    environment:
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - db
      - redis

  # ── Celery beat (scheduler) ───────────────────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - redis

  # ── Flower (Celery dashboard) ─────────────────────────────────────────────
  flower:
    image: mher/flower:2.0
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
  
  # ── Market Ingestion Service ──────────────────────────────────────────────
  # Manages persistent WebSockets for live market data
  ingestor:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    command: python -m app.workers.market_ingestion_worker
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Monitoring: exporters ─────────────────────────────────────────────────
  postgres_exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${DATABASE_USER}:${DATABASE_PASSWORD:-password}@db:5432/${DATABASE_NAME}?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      db:
        condition: service_healthy

  redis_exporter:
    image: oliver006/redis_exporter:v1.62.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "9121:9121"
    depends_on:
      - redis

  celery_exporter:
    image: danihodovic/celery-exporter:latest
    restart: unless-stopped
    command: --broker-url=redis://redis:6379/0
    ports:
      - "9808:9808"
    depends_on:
      - redis

  # ── Monitoring: Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    # host networking: the API/worker/beat run natively on the host (not as
    # compose services) bound to 127.0.0.1, which a bridge-networked
    # container cannot reach even via host-gateway. On the host network,
    # every target -- native app included -- is just localhost:<port>.
    network_mode: host
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - postgres_exporter
      - redis_exporter
      - celery_exporter

  # ── Monitoring: Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.1
    restart: unless-stopped
    # host networking to match prometheus (see its comment above) -- once
    # prometheus left the bridge network, its compose service name stopped
    # resolving for anything still on the bridge, so this reaches it at
    # localhost:9090 instead (see datasource.yml).
    network_mode: host
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./monitoring/grafana/provisioning/datasources/local:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pgdata:
  prometheus_data:
  grafana_data:
