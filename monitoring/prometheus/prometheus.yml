global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # This container runs with network_mode: host (see local-docker-compose.yml)
  # so every target -- the natively-run FastAPI app included, which is bound
  # to 127.0.0.1:9000 and unreachable from a bridge-networked container -- is
  # reached via localhost at its host-published port.
  - job_name: pios-api
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:9000"]

  - job_name: postgres
    static_configs:
      - targets: ["localhost:9187"]

  - job_name: redis
    static_configs:
      - targets: ["localhost:9121"]

  - job_name: celery
    static_configs:
      - targets: ["localhost:9808"]
